name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: stint
            deb: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: stint
            deb: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: stint
            deb: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: stint
            deb: false
          - target: x86_64-pc-windows-msvc
            # Pinned: windows-latest redirects to windows-2025-vs2026 as of
            # June 2026 — keep the release build environment explicit.
            os: windows-2025-vs2026
            artifact: stint.exe
            deb: false

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../stint-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../stint-${{ matrix.target }}.zip

      - name: Build .deb package
        if: matrix.deb
        run: |
          cargo install cargo-deb --locked
          cargo deb -p stint-cli --target ${{ matrix.target }} --no-build
          cp target/${{ matrix.target }}/debian/*.deb stint-${{ matrix.target }}.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: stint-${{ matrix.target }}
          path: stint-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish stint-core
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | grep -o '"stint-core","version":"[^"]*"' | cut -d'"' -f6)
          if curl -sf "https://crates.io/api/v1/crates/stint-core/$VERSION" > /dev/null 2>&1; then
            echo "stint-core $VERSION already published, skipping"
          else
            cargo publish -p stint-core --no-verify
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for stint-core index update
        run: sleep 60

      - name: Publish stint-server
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | grep -o '"stint-server","version":"[^"]*"' | cut -d'"' -f6)
          if curl -sf "https://crates.io/api/v1/crates/stint-server/$VERSION" > /dev/null 2>&1; then
            echo "stint-server $VERSION already published, skipping"
          else
            cargo publish -p stint-server --no-verify
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for stint-server index update
        run: sleep 60

      - name: Publish stint-cli
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | grep -o '"stint-cli","version":"[^"]*"' | cut -d'"' -f6)
          if curl -sf "https://crates.io/api/v1/crates/stint-cli/$VERSION" > /dev/null 2>&1; then
            echo "stint-cli $VERSION already published, skipping"
          else
            cargo publish -p stint-cli --no-verify
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-vscode:
    name: Publish VS Code extension
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Build and publish extension
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is not set"
            exit 1
          fi
          cd editors/vscode
          pnpm install
          pnpm run build
          npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT" || echo "Extension version already published, skipping"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-apt:
    name: Publish to apt repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download .deb artifact
        uses: actions/download-artifact@v8
        with:
          name: stint-x86_64-unknown-linux-gnu
          path: incoming/

      - name: Import GPG key
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "::error::APT_GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}

      - name: Install apt tools
        run: sudo apt-get update && sudo apt-get install -y apt-utils dpkg-dev

      - name: Update apt repository
        run: |
          mkdir -p pool/main/s/stint
          cp incoming/*.deb pool/main/s/stint/

          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          cd dists/stable
          cat > apt-release.conf <<CONF
          APT::FTPArchive::Release::Origin "Mosaic Ridge LLC";
          APT::FTPArchive::Release::Label "Stint";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Components "main";
          APT::FTPArchive::Release::Architectures "amd64";
          CONF
          apt-ftparchive -c apt-release.conf release . > Release
          rm apt-release.conf
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf incoming/
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update apt repo for ${{ github.ref_name }}"
          git fetch origin gh-pages
          git rebase origin/gh-pages
          git push origin HEAD:gh-pages --force-with-lease
